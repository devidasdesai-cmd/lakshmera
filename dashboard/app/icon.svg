<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="8" fill="#0369a1"/>

  <!-- Sun rays -->
  <g stroke="#fcd34d" stroke-width="2" stroke-linecap="round">
    <line x1="11" y1="2"    x2="11" y2="5"/>
    <line x1="11" y1="17"   x2="11" y2="19.5"/>
    <line x1="2"  y1="11"   x2="5"  y2="11"/>
    <line x1="17" y1="11"   x2="20" y2="11"/>
    <line x1="5.1"  y1="5.1"  x2="7.2"  y2="7.2"/>
    <line x1="16.9" y1="5.1"  x2="14.8" y2="7.2"/>
    <line x1="14.8" y1="14.8" x2="16.9" y2="16.9"/>
    <line x1="7.2"  y1="14.8" x2="5.1"  y2="16.9"/>
  </g>

  <!-- Sun -->
  <circle cx="11" cy="11" r="5.5" fill="#fcd34d"/>

  <!-- Cloud (overlapping circles + base rect) -->
  <circle cx="12"  cy="23" r="4"   fill="white"/>
  <circle cx="18"  cy="20" r="5"   fill="white"/>
  <circle cx="23.5" cy="23" r="3.5" fill="white"/>
  <rect   x="8"   y="23"  width="19.5" height="6" rx="3" fill="white"/>
</svg>
