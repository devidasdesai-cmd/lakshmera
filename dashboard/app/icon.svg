<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="cloudGrad" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#d8b4fe"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <clipPath id="cloudClip">
      <circle cx="12" cy="24" r="4.5"/>
      <circle cx="18" cy="21" r="5.5"/>
      <circle cx="24" cy="24" r="4"/>
      <rect x="8" y="24" width="20" height="7" rx="3.5"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="#1e1b4b"/>

  <!-- Stars -->
  <circle cx="24" cy="5"  r="1"   fill="white" opacity="0.8"/>
  <circle cx="29" cy="11" r="0.7" fill="white" opacity="0.6"/>
  <circle cx="27" cy="3"  r="0.5" fill="white" opacity="0.5"/>

  <!-- Moon (crescent via two circles) -->
  <circle cx="10" cy="12" r="7.5" fill="#fde68a"/>
  <circle cx="14" cy="9"  r="6.5" fill="#1e1b4b"/>

  <!-- Cloud with purple gradient -->
  <rect x="0" y="0" width="32" height="32" fill="url(#cloudGrad)" clip-path="url(#cloudClip)"/>
</svg>
