<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="sunGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ffe066"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </radialGradient>
  </defs>

  <!-- Sky -->
  <rect width="32" height="32" rx="8" fill="#38bdf8"/>

  <!-- Rays -->
  <g stroke="#f59e0b" stroke-width="2.2" stroke-linecap="round">
    <line x1="16" y1="3"    x2="16" y2="7"/>
    <line x1="16" y1="25"   x2="16" y2="29"/>
    <line x1="3"  y1="16"   x2="7"  y2="16"/>
    <line x1="25" y1="16"   x2="29" y2="16"/>
    <line x1="7.2"  y1="7.2"  x2="9.9"  y2="9.9"/>
    <line x1="22.1" y1="22.1" x2="24.8" y2="24.8"/>
    <line x1="24.8" y1="7.2"  x2="22.1" y2="9.9"/>
    <line x1="9.9"  y1="22.1" x2="7.2"  y2="24.8"/>
  </g>

  <!-- Sun -->
  <circle cx="16" cy="16" r="6.5" fill="url(#sunGrad)"/>
</svg>
