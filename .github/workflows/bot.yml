name: Lakshmera Weather Bot

on:
  schedule:
    # Trading runs only. Offsetting 16 min past the hour to dodge the busy
    # top-of-hour and the moderately-popular :15 slot in GitHub Actions' cron
    # scheduler.
    #   14:16 UTC = 9:16 AM CT, catches contracts right as Kalshi opens them
    #   16:16 UTC = 11:16 AM CT, 12z primary trading run (fresh GFS data)
    #   22:16 UTC = 5:16 PM CT, 18z run for 2+ days-out contracts
    - cron: "16 14,16,22 * * *"
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  run-bot:
    runs-on: ubuntu-latest
    # 25-minute cap (was 10). Multi-source forecast pipeline (GFS + ECMWF + climatology
    # + NWS + orderbook) makes many API calls; 10 min was hitting the wall mid-evaluation.
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          KALSHI_API_KEY_ID: ${{ secrets.KALSHI_API_KEY_ID }}
          KALSHI_API_KEY: ${{ secrets.KALSHI_API_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: python src/main.py
