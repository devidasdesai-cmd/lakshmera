name: Lakshmera Weather Bot

on:
  schedule:
    # Two best-effort GitHub schedules, each with a distinct purpose:
    #   - 04:16 UTC catches the 00z forecast cycle (no Vercel slot covers it)
    #   - 17:16 UTC is a delayed backup for the 16:30 UTC Vercel workhorse
    # Primary trading runs come from Vercel Cron (dashboard/vercel.json) at
    # 10:30 UTC and 16:30 UTC. Vercel silently skipped a full day on
    # 2026-05-30, so the 17:16 UTC GitHub slot is our defense against repeats.
    #
    # GitHub Actions cron is unreliable (typical 0-3h delay) but at least
    # fails noisily — missed runs show in the Actions tab.
    #
    # Minute offset 16 chosen to avoid the GitHub Actions queue rush at
    # :00 / :15 / :30 / :45.
    #
    # Avoid scheduling between 22-03 UTC: the bot's _current_gfs_run() tags
    # those hours as "18z", which triggers the min_target_date = today+2
    # special case in trader.py. Kalshi doesn't list 2-day-out contracts, so
    # 18z-tagged runs find zero actionable markets.
    - cron: "16 4 * * *"    # 04:16 UTC = 11:16 PM CT → 00z forecast, overnight, quietest market
    - cron: "16 17 * * *"   # 17:16 UTC = 12:16 PM CT → backup for Vercel 16:30 UTC
  workflow_dispatch: # Manual trigger; also used by Vercel Cron via workflow_dispatch API

jobs:
  run-bot:
    runs-on: ubuntu-latest
    # 25-minute cap (was 10). Multi-source forecast pipeline (GFS + ECMWF + climatology
    # + NWS + orderbook) makes many API calls; 10 min was hitting the wall mid-evaluation.
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          KALSHI_API_KEY_ID: ${{ secrets.KALSHI_API_KEY_ID }}
          KALSHI_API_KEY: ${{ secrets.KALSHI_API_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: python src/main.py
