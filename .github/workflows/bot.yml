name: Lakshmera Weather Bot

on:
  schedule:
    # Runs 4 hours after each GFS model update (00z/06z/12z/18z UTC)
    # GFS data takes ~3-4 hours to process — this catches fresh data each cycle
    - cron: "0 4,10,16,22 * * *"
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          KALSHI_API_KEY_ID: ${{ secrets.KALSHI_API_KEY_ID }}
          KALSHI_API_KEY: ${{ secrets.KALSHI_API_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: python src/main.py
