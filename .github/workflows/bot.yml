name: Lakshmera Weather Bot

on:
  schedule:
    # Trading runs only. Offsetting by 15 minutes off the top of the hour
    # reduces the chance of GitHub Actions skipping scheduled runs — top-of-hour
    # is the busiest slot for the scheduler since most repos default there.
    #   14:15 UTC = 9:15 AM CT, catches contracts right as Kalshi opens them
    #   16:15 UTC = 11:15 AM CT, 12z primary trading run (fresh GFS data)
    #   22:15 UTC = 5:15 PM CT, 18z run for 2+ days-out contracts
    - cron: "15 14,16,22 * * *"
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  run-bot:
    runs-on: ubuntu-latest
    # 25-minute cap (was 10). Multi-source forecast pipeline (GFS + ECMWF + climatology
    # + NWS + orderbook) makes many API calls; 10 min was hitting the wall mid-evaluation.
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          KALSHI_API_KEY_ID: ${{ secrets.KALSHI_API_KEY_ID }}
          KALSHI_API_KEY: ${{ secrets.KALSHI_API_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: python src/main.py
