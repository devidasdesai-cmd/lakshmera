name: Lakshmera Weather Bot

on:
  schedule:
    # The 11:37 AM CT and 6:37 PM CT runs are now triggered by Vercel Cron
    # (dashboard/vercel.json), which is reliable. The only schedule entry
    # remaining here is the morning slot, which Vercel Cron can't cover on
    # the Hobby plan's 2-cron-per-project limit. This is best-effort —
    # GitHub Actions may still skip it, but if it fires it catches the
    # early NWS Daily Climate Reports for prior-day settlements.
    - cron: "16 11 * * *"   # 11:16 UTC = 6:16 AM CT
  workflow_dispatch: # Manual trigger; also used by Vercel Cron via workflow_dispatch API

jobs:
  run-bot:
    runs-on: ubuntu-latest
    # 25-minute cap (was 10). Multi-source forecast pipeline (GFS + ECMWF + climatology
    # + NWS + orderbook) makes many API calls; 10 min was hitting the wall mid-evaluation.
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          KALSHI_API_KEY_ID: ${{ secrets.KALSHI_API_KEY_ID }}
          KALSHI_API_KEY: ${{ secrets.KALSHI_API_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: python src/main.py
