name: Lakshmera Weather Bot

on:
  # Step 1 of 2: schedule block intentionally removed to give GitHub Actions'
  # cron scheduler a clean slate before the new schedule is added. Frequent
  # cron edits over the past few days have correlated with skipped runs;
  # this gap should let scheduler state fully clear. The new schedule will
  # be added in a follow-up commit after ~30-60 minutes of "no schedule".
  workflow_dispatch: # Manual triggers still work

jobs:
  run-bot:
    runs-on: ubuntu-latest
    # 25-minute cap (was 10). Multi-source forecast pipeline (GFS + ECMWF + climatology
    # + NWS + orderbook) makes many API calls; 10 min was hitting the wall mid-evaluation.
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          KALSHI_API_KEY_ID: ${{ secrets.KALSHI_API_KEY_ID }}
          KALSHI_API_KEY: ${{ secrets.KALSHI_API_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: python src/main.py
