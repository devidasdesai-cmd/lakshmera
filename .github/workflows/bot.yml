name: Lakshmera Weather Bot

on:
  schedule:
    # Two best-effort backup schedules. The primary trading runs come from
    # Vercel Cron (dashboard/vercel.json) at 16:37 UTC and 23:37 UTC, but
    # Vercel Cron silently skipped a full day on 2026-05-30 — no trades for
    # 2026-05-31 contracts as a result. GitHub Actions native schedules are
    # also unreliable (typical 0-3h delay) but at least they fail noisily.
    #
    # Minute offset 16 chosen to avoid the GitHub Actions queue rush at
    # :00 / :15 / :30 / :45.
    - cron: "16 11 * * *"   # 11:16 UTC = 6:16 AM CT  → catches morning settlements
    - cron: "16 17 * * *"   # 17:16 UTC = 12:16 PM CT → backup for Vercel 16:37 UTC
  workflow_dispatch: # Manual trigger; also used by Vercel Cron via workflow_dispatch API

jobs:
  run-bot:
    runs-on: ubuntu-latest
    # 25-minute cap (was 10). Multi-source forecast pipeline (GFS + ECMWF + climatology
    # + NWS + orderbook) makes many API calls; 10 min was hitting the wall mid-evaluation.
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          KALSHI_API_KEY_ID: ${{ secrets.KALSHI_API_KEY_ID }}
          KALSHI_API_KEY: ${{ secrets.KALSHI_API_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: python src/main.py
