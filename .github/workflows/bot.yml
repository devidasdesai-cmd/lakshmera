name: Lakshmera Weather Bot

on:
  schedule:
    # Three runs per day, each on a separate cron entry for clarity.
    # Spread across UTC hours (11, 16, 23) to avoid having all three
    # vulnerable to the same European-peak congestion window (13-15 UTC).
    # Minute offsets `:16` and `:37` are prime/odd numbers that dodge the
    # heavily-loaded top-of-hour and quarter-hour marks.
    #
    # Schedule (clean re-introduction after step 1 cleared the slate):
    - cron: "16 11 * * *"   # 11:16 UTC = 6:16 AM CT  — early morning, pre-European-peak
    - cron: "37 16 * * *"   # 16:37 UTC = 11:37 AM CT — fresh 12z GFS data, primary window
    - cron: "37 23 * * *"   # 23:37 UTC = 6:37 PM CT  — fresh 18z GFS data, very quiet UTC slot
  workflow_dispatch: # Manual trigger from GitHub Actions tab

jobs:
  run-bot:
    runs-on: ubuntu-latest
    # 25-minute cap (was 10). Multi-source forecast pipeline (GFS + ECMWF + climatology
    # + NWS + orderbook) makes many API calls; 10 min was hitting the wall mid-evaluation.
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          KALSHI_API_KEY_ID: ${{ secrets.KALSHI_API_KEY_ID }}
          KALSHI_API_KEY: ${{ secrets.KALSHI_API_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: python src/main.py
