name: Lakshmera Weather Bot

on:
  schedule:
    # Three runs per day, scheduled at :37 past the hour. Prime-number minute
    # offset avoids the heavily-loaded top-of-hour and the moderately-popular
    # :15/:30/:45 quarter-hour marks in GitHub Actions' cron scheduler.
    # Slots chosen to align with NWS settlement publication and GFS data drops:
    #   15:37 UTC = 10:37 AM CT — most NWS Daily Climate Reports have published
    #               by 14-15 UTC, so this run reliably catches prior-day
    #               settlements and places some morning trades on 06z data
    #   17:37 UTC = 12:37 PM CT — 12z GFS becomes available on Open-Meteo
    #               around 16 UTC; this run uses fresh 12z data (primary
    #               trading window)
    #   22:37 UTC = 5:37 PM CT  — 18z GFS becomes available around 22 UTC;
    #               this run places 2+ days-out bets on freshly-published
    #               late-afternoon model data
    - cron: "37 15,17,22 * * *"
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  run-bot:
    runs-on: ubuntu-latest
    # 25-minute cap (was 10). Multi-source forecast pipeline (GFS + ECMWF + climatology
    # + NWS + orderbook) makes many API calls; 10 min was hitting the wall mid-evaluation.
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          KALSHI_API_KEY_ID: ${{ secrets.KALSHI_API_KEY_ID }}
          KALSHI_API_KEY: ${{ secrets.KALSHI_API_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: python src/main.py
