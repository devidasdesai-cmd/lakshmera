name: Lakshmera Weather Bot

on:
  schedule:
    # Trading runs only — the 04 UTC (00z) and 10 UTC (06z) runs were removed
    # because Kalshi doesn't open next-day contracts until ~13 UTC, so they
    # produced zero signals. Schedule now:
    #   14 UTC = ~10am ET, catches contracts right as Kalshi opens them
    #   16 UTC = 12z run, primary trading run
    #   22 UTC = 18z run, picks up 2+ days-out contracts
    - cron: "0 14,16,22 * * *"
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  run-bot:
    runs-on: ubuntu-latest
    # 25-minute cap (was 10). Multi-source forecast pipeline (GFS + ECMWF + climatology
    # + NWS + orderbook) makes many API calls; 10 min was hitting the wall mid-evaluation.
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          KALSHI_API_KEY_ID: ${{ secrets.KALSHI_API_KEY_ID }}
          KALSHI_API_KEY: ${{ secrets.KALSHI_API_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: python src/main.py
